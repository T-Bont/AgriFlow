name: Market Ingest Cron

on:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  trigger-market-ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Call Supabase market_ingest
        run: |
          response=$(curl -sS -X POST "${{ secrets.SUPABASE_FUNCTION_URL }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -d '{"reason":"github_cron"}')
          echo "Response: $response"
          echo "$response" | grep -q '"ok":true' || (echo "market_ingest failed" && exit 1)